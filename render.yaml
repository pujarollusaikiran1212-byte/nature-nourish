services:
  - type: web
    name: nature-nourish-api
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
