<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Nature Nourish</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <div class="container">
            <div class="logo">Nature Nourish</div>
            <nav class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#products">Products</a>
                <a href="index.html#cart">Cart</a>
            </nav>
        </div>
    </header>

    <section class="checkout-section">
        <div class="container">
            <h2 class="section-title">Checkout</h2>

            <div id="checkout-container">
                <div class="checkout-container">
                    <div class="order-review">
                        <h3>Order Summary</h3>
                        <div id="checkout-items"></div>
                        <div class="checkout-total">
                            <h4>Total: Rs.<span id="total">0</span></h4>
                        </div>

                        <form class="checkout-form" id="checkout-form">
                            <h3>Delivery Information</h3>
                            <input type="text" id="full-name" placeholder="Full Name" required>
                            <input type="email" id="email" placeholder="Email Address" required>
                            <input type="tel" id="phone" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}"
                                required>
                            <select id="state" required>
                                <option value="">Select State</option>
                                <option value="Andhra Pradesh">Andhra Pradesh</option>
                                <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                <option value="Assam">Assam</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Chhattisgarh">Chhattisgarh</option>
                                <option value="Goa">Goa</option>
                                <option value="Gujarat">Gujarat</option>
                                <option value="Haryana">Haryana</option>
                                <option value="Himachal Pradesh">Himachal Pradesh</option>
                                <option value="Jharkhand">Jharkhand</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Kerala">Kerala</option>
                                <option value="Madhya Pradesh">Madhya Pradesh</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Manipur">Manipur</option>
                                <option value="Meghalaya">Meghalaya</option>
                                <option value="Mizoram">Mizoram</option>
                                <option value="Nagaland">Nagaland</option>
                                <option value="Odisha">Odisha</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Sikkim">Sikkim</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Telangana">Telangana</option>
                                <option value="Tripura">Tripura</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="Uttarakhand">Uttarakhand</option>
                                <option value="West Bengal">West Bengal</option>
                                <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                                <option value="Chandigarh">Chandigarh</option>
                                <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and
                                    Daman and Diu</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                                <option value="Ladakh">Ladakh</option>
                                <option value="Lakshadweep">Lakshadweep</option>
                                <option value="Puducherry">Puducherry</option>
                            </select>
                            <input type="text" id="city" placeholder="City" required>
                            <input type="text" id="pincode" placeholder="Postal Code (6 digits)" pattern="[0-9]{6}"
                                required>
                            <textarea id="address" placeholder="Complete Address" rows="4" required></textarea>

                            <h3 style="margin-top: 2rem;">Payment Method</h3>
                            <div class="payment-options">
                                <label><input type="radio" name="payment" value="cod" checked> Cash on Delivery</label>
                            </div>

                            <!-- Price Summary Section -->
                            <div class="price-summary">
                                <h4>Price Details</h4>
                                <div class="price-summary-box">
                                    <div class="price-row">
                                        <span>Subtotal</span>
                                        <span>Rs.<span id="subtotal">0</span></span>
                                    </div>
                                    <div class="price-row">
                                        <span>Shipping</span>
                                        <span class="free-shipping">FREE</span>
                                    </div>
                                    <div class="price-row total">
                                        <span>Total</span>
                                        <span>Rs.<span id="summary-total">0</span></span>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="place-order-btn">Place Order</button>
                        </form>
                    </div>

                    <div id="empty-cart" style="display:none; text-align:center; padding: 60px;">
                        <h3>Your cart is empty</h3>
                        <p>Add products from the store first.</p>
                        <a href="index.html#products" class="btn" style="display:inline-block; margin-top:15px;">Browse
                            Products</a>
                    </div>
    </section>

    <div id="success-modal" class="modal">
        <div class="modal-content success-content">
            <h2>Order Placed Successfully!</h2>
            <p id="success-order-id"></p>
            <button class="btn" onclick="window.location.href='index.html#products'">Continue Shopping</button>
        </div>

        <script>
            var API_URL = 'https://nature-nourish-production.up.railway.app';
            var cartItems = [];

            function init() {
                console.log('Checkout init...');
                loadCart();
            }

            function loadCart() {
                try {
                    var cartData = localStorage.getItem('checkoutCart') || localStorage.getItem('cart');

                    if (cartData && cartData !== 'null' && cartData !== 'undefined') {
                        cartItems = JSON.parse(cartData);
                    }

                    console.log('Cart items:', cartItems);

                    if (!cartItems || !cartItems.length) {
                        showEmptyCart();
                    } else {
                        renderCheckout();
                    }
                } catch (e) {
                    console.error('Error loading cart:', e);
                    showEmptyCart();
                }
            }

            function showEmptyCart() {
                document.getElementById('checkout-container').style.display = 'none';
                document.getElementById('empty-cart').style.display = 'block';
            }

            // Product image mapping
            function getProductImage(name) {
                var images = {
                    'Solar Calm': 'solar calm.jpeg',
                    'Clearwave': 'clear wave.jpeg',
                    'Milk Cloud': 'milk cloud.jpeg',
                    'Glow Dust': 'glow dust.jpeg',
                    'Lavender Bliss': 'lavender bliss.jpeg',
                    'Rose Petal': 'rose petal.jpeg',
                    'Charcoal Cleanse': 'charcoal.jpeg',
                    'Charcoal': 'charcoal.jpeg',
                    'Aloe Vera Glow': 'aloe vera.jpeg',
                    'Aloe Vera': 'aloe vera.jpeg'
                };
                var cleanName = name ? name.replace(' (Bundle)', '').trim() : '';
                return images[cleanName] || 'https://via.placeholder.com/80';
            }

            function renderCheckout() {
                document.getElementById('checkout-container').style.display = 'block';
                document.getElementById('empty-cart').style.display = 'none';

                var container = document.getElementById('checkout-items');
                var html = '';
                var total = 0;

                for (var i = 0; i < cartItems.length; i++) {
                    var item = cartItems[i];
                    var qty = item.quantity || 1;
                    var price = item.price || 0;
                    var itemTotal = price * qty;
                    total += itemTotal;
                    var imageSrc = item.image || getProductImage(item.name);

                    html += '<div class="checkout-item">';
                    html += '<img src="' + imageSrc + '" alt="' + (item.name || 'Product') + '" style="width:60px;height:60px;object-fit:cover;border-radius:6px;margin-right:12px;">';
                    html += '<div style="flex:1;">';
                    html += '<div style="font-weight:500;">' + (item.name || 'Product') + '</div>';
                    html += '<div style="color:#666;font-size:0.9rem;">Rs.' + price + ' x ' + qty + '</div>';
                    html += '</div>';
                    html += '<div style="font-weight:600;">Rs.' + itemTotal + '</div>';
                    html += '</div>';
                }

                container.innerHTML = html || '<p>No items</p>';

                // Update all total displays
                document.getElementById('total').textContent = total;
                document.getElementById('subtotal').textContent = total;
                document.getElementById('summary-total').textContent = total;
            }

            document.getElementById('checkout-form').addEventListener('submit', function (e) {
                e.preventDefault();

                if (!cartItems || !cartItems.length) {
                    alert('Your cart is empty!');
                    return;
                }

                var name = document.getElementById('full-name').value;
                var email = document.getElementById('email').value;
                var phone = document.getElementById('phone').value;
                var state = document.getElementById('state').value;
                var city = document.getElementById('city').value;
                var pincode = document.getElementById('pincode').value;
                var address = document.getElementById('address').value;

                if (!name || !email || !phone || !state || !city || !pincode || !address) {
                    alert('Please fill all fields');
                    return;
                }

                var subtotal = 0;
                var products = [];
                for (var i = 0; i < cartItems.length; i++) {
                    var item = cartItems[i];
                    var imageSrc = item.image || getProductImage(item.name);
                    subtotal += (item.price || 0) * (item.quantity || 1);
                    products.push({
                        name: item.name,
                        price: item.price || 0,
                        quantity: item.quantity || 1,
                        image: imageSrc
                    });
                }

                var order = {
                    orderId: 'ORD-' + Date.now(),
                    customerName: name,
                    email: email,
                    phone: phone,
                    address: address,
                    city: city,
                    state: state,
                    pincode: pincode,
                    items: products,
                    subtotal: subtotal,
                    total: subtotal,
                    paymentMethod: 'COD'
                };

                console.log('Submitting order:', order);

                var btn = document.querySelector('.place-order-btn');
                btn.textContent = 'Placing Order...';
                btn.disabled = true;

                fetch(API_URL + '/place-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                })
                    .then(function (res) {
                        if (!res.ok) throw new Error('Server error');
                        return res.json();
                    })
                    .then(function (data) {
                        console.log('Order saved:', data);
                        localStorage.removeItem('cart');
                        localStorage.removeItem('checkoutCart');
                        document.getElementById('success-order-id').textContent = 'Order ID: ' + (data.orderId || order.orderId);
                        document.getElementById('success-modal').style.display = 'block';
                    })
                    .catch(function (err) {
                        console.error('Error:', err);
                        alert('Failed to place order. Please try again.');
                        btn.textContent = 'Place Order';
                        btn.disabled = false;
                    });
            });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        </script>
</body>

</html>
