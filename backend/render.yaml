services:
  - type: web
    name: nature-nourish-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
    autoDeploy: true
    healthCheckPath: /api/health
